version: "3.9"

services:

  backend:
    build: ./backend

    container_name: voicegpt-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/generated_audio:/app/generated_audio

  frontend:
    build: ./frontend

    container_name: voicegpt-frontend

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env.local

    depends_on:
      - backend